<!doctype html>
<html lang="pt-BR" viewmodel="VisualStateViewModel">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BindifyJS — Estado visual</title>
    <link rel="stylesheet" href="../shared.css">
    <link rel="stylesheet" href="style.css">
    <script type="module" src="ViewModel.js"></script>
    <script type="module" src="../../BindifyJS.auto.js"></script>
</head>
<body>
    <main>
        <h1>Estado visual</h1>
        <section
            class="meter"
            data-class="complete: complete;"
            data-css-var="
                progress: progress;
                accent-color: accentColor;
            ">
            <div></div>
        </section>
        <output data-bind="target: textContent; source: legenda;"></output>
        <button data-event="event: click; method: avancar">
            Avançar
        </button>
    </main>
</body>
</html>
