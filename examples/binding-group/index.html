<!doctype html>
<html lang="pt-BR" viewmodel="BindingGroupExampleViewModel">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BindifyJS — Binding group</title>
    <link rel="stylesheet" href="../shared.css">
    <script type="module" src="ViewModel.js"></script>
    <script type="module" src="../../BindifyJS.auto.js"></script>
</head>
<body>
    <main>
        <h1>Grupo transacional</h1>
        <form
            data-binding-group="perfil"
            data-event="event: bindingscommit; method: salvo">
            <label>Nome
                <input data-bind="
                    target: value;
                    source: nome;
                    mode: twoway;
                    when: groupcommit;
                ">
            </label>
            <small data-validation-for="nome"></small>
            <button type="button" data-binding-commit>Confirmar</button>
            <button type="button" data-binding-cancel>Cancelar</button>
        </form>
        <output data-bind="target: textContent; source: mensagem;"></output>
    </main>
</body>
</html>
