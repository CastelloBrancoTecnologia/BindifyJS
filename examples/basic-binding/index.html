<!doctype html>
<html lang="pt-BR" viewmodel="BasicBindingViewModel">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BindifyJS — Binding básico</title>
    <link rel="stylesheet" href="../shared.css">
    <script type="module" src="ViewModel.js"></script>
    <script type="module" src="../../BindifyJS.auto.js"></script>
</head>
<body>
    <main>
        <h1>Binding básico</h1>
        <label>Nome
            <input data-bind="target: value; source: nome; mode: twoway;">
        </label>
        <label>Sobrenome
            <input data-bind="target: value; source: sobrenome; mode: twoway;">
        </label>
        <output data-bind="target: textContent; source: nomeCompleto;"></output>
    </main>
</body>
</html>
