<!doctype html>
<html lang="pt-BR" viewmodel="ListExampleViewModel">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BindifyJS — Lista</title>
    <link rel="stylesheet" href="../shared.css">
    <script type="module" src="ViewModel.js"></script>
    <script type="module" src="../../BindifyJS.auto.js"></script>
</head>
<body>
    <main>
        <h1>Lista reativa</h1>
        <button data-event="event: click; method: adicionar">
            Adicionar
        </button>
        <ul>
            <template data-for="item in itens" data-for-key="id">
                <li>${$number}. ${item.nome}</li>
            </template>
        </ul>
    </main>
</body>
</html>
