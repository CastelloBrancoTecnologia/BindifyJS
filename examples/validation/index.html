<!doctype html>
<html lang="pt-BR" viewmodel="ValidationExampleViewModel">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BindifyJS — Validação</title>
    <link rel="stylesheet" href="../shared.css">
    <script type="module" src="ViewModel.js"></script>
    <script type="module" src="../../BindifyJS.auto.js"></script>
</head>
<body>
    <main>
        <h1>Validação</h1>
        <label
            data-class="
                error: fieldState.email.error;
                pending: fieldState.email.pending;
            ">
            E-mail
            <input
                type="email"
                data-bind="target: value; source: email; mode: twoway;">
        </label>
        <small data-validation-for="email"></small>
        <button data-event="event: click; method: validar">
            Validar
        </button>
        <output data-bind="target: textContent; source: resultado;"></output>
    </main>
</body>
</html>
